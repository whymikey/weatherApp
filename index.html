<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <title>WeatherApp</title>
  </head>
  <body>
    <div class="container">
      <div class="search__box">
        <i class="bi bi-geo-alt-fill"></i>
        <input
          class="search__input"
          id="input"
          type="text"
          placeholder="Enter your location"
        />
        <button type="button" class="btn">
          <i class="bi bi-search"></i>
        </button>
      </div>

      <div class="not__found">
        <img
          src="./src/images/404.png"
          alt="not found location"
          class="image__not-found"
        />
        <p class="not__found__text-error">Oops! Invalid location :/</p>
      </div>

      <div class="weather__box">
        <img src="./src/images/clear.png" alt="Weather" class="weather__img" />
        <p class="weather__temperature"></p>
        <p class="weather__description"></p>
      </div>

      <div class="weather__details">
        <div class="weather__humidity">
          <i class="bi bi-water"></i>
          <div class="weather__details__text">
            <span class="weather__details__text-data humidity"></span>
            <p>Humidity</p>
          </div>
        </div>
        <div class="weather__wind">
          <i class="bi bi-wind"></i>
          <div class="weather__details__text">
            <span class="weather__details__text-data wind"></span>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
